<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>割り勘ツール - Keiba Dashboard</title>
    <meta name="description" content="社内イベントや２次会などで使える、差し引き計算機能付き割り勘管理ツール。">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Roboto+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap"
        rel="stylesheet">



    <!-- Custom Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pure-black': '#000000',
                        'dark-gray': '#1A1A1A',
                        'champagne-gold': '#D4AF37',
                        'silver': '#C0C0C0',
                    },
                    fontFamily: {
                        'serif-jp': ['"Noto Serif JP"', 'serif'],
                        'mono': ['"Roboto Mono"', 'monospace'],
                        'sans': ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-pure-black text-white font-sans">

    <!-- Main Wrapper Section -->
    <section class="min-h-screen py-8 bg-pure-black relative overflow-hidden visible">
        <div class="absolute inset-0 bg-gradient-to-br from-pure-black via-dark-gray to-pure-black opacity-90 pointer-events-none"></div>

        <div class="container mx-auto px-4 relative z-10">
            <div class="max-w-md mx-auto pb-16">
                <!-- Header -->
                <header class="pt-4 pb-5">
                    <div class="flex items-baseline justify-between">
                        <h1 class="font-serif-jp text-2xl tracking-wide font-black">
                            <span class="bg-gradient-to-r from-champagne-gold to-silver bg-clip-text text-transparent">
                                社内割り勘
                            </span>
                        </h1>
                        <span class="text-[10px] font-mono text-gray-500 tracking-widest">
                            WARIKAN TOOL
                        </span>
                    </div>
                    <div class="mt-2 h-px bg-gradient-to-r from-champagne-gold/60 via-gray-800/20 to-transparent"></div>
                </header>

                <!-- React App Replaced Container -->
                <div id="app-container" class="space-y-6">
                    <!-- Dynamic rendering by warikan.js -->
                    <div class="flex items-center justify-center py-20">
                        <div class="loading"></div>
                        <span class="ml-3 text-gray-400 font-mono text-sm">読み込み中...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-pure-black py-12 border-t border-gray-800 relative z-10">
        <div class="container mx-auto px-6 text-center">
            <div class="flex justify-center gap-8 mb-6 flex-wrap">
                <a href="index.html" class="text-champagne-gold hover:text-silver transition-colors font-bold">
                    ← メインページに戻る
                </a>
                <a href="member.html" class="text-gray-400 hover:text-champagne-gold transition-colors font-bold">
                    会員ページ
                </a>
                <a href="contact.html" class="text-gray-400 hover:text-champagne-gold transition-colors font-bold">
                    お問合せ
                </a>
                <a href="admin.html" class="text-gray-400 hover:text-champagne-gold transition-colors font-bold">
                    管理者ページ
                </a>
            </div>
            <p class="text-gray-500 text-sm tracking-widest">
                © 2026 Personal Profile & Keiba Dashboard. All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Core App Logic -->
    <script src="warikan.js"></script>
</body>

</html>
